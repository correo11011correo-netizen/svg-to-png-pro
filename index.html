<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>Punto 33 | Liquid Lab 3-Engines</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .btn-activate { background: #334155; color: white; border: none; padding: 0.8rem; border-radius: 8px; width: 100%; cursor: pointer; transition: 0.2s; }
        .btn-activate:hover { background: #475569; }
        .btn-export { display: none; background: var(--accent); color: black; border: none; padding: 0.8rem; border-radius: 8px; width: 100%; cursor: pointer; margin-top: 0.5rem; font-weight: bold; }
        .scroll-hint { display: none; } /* Oculto inicialmente */
    </style>
</head>
<body>

    <header>
        <h1>🧪 Liquid Lab (Stress Test)</h1>
        <p>1. Selecciona un motor.<br>2. Scrollea para llenarlo.<br>3. Exporta la imagen.</p>
    </header>

    <div class="scroll-hint" id="scroll-hint">
        <span>Baja para llenar el vaso</span>
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M19 12l-7 7-7-7"/></svg>
    </div>

    <!-- PISTA DE SCROLL -->
    <div style="height: 350vh;"></div>

    <div class="engines-container">

        <!-- MOTOR 1: MASK & RECT -->
        <div class="glass-wrapper" id="wrapper-1">
            <div class="engine-title">M1: Mask Rect<br><sub>Revelado de Abajo arriba</sub></div>
            <svg viewBox="0 0 400 400" id="svg-engine-1" xmlns="http://www.w3.org/2000/svg">
                <mask id="m1-mask">
                    <rect id="m1-rect" x="0" y="350" width="400" height="0" fill="white" />
                </mask>
                <clipPath id="cup-shape"><path d="M 120 100 L 140 340 A 10 10 0 0 0 150 350 L 250 350 A 10 10 0 0 0 260 340 L 280 100 Z" /></clipPath>
                <g clip-path="url(#cup-shape)">
                    <g mask="url(#m1-mask)">
                        <path d="M 0 0 L 400 0 L 400 400 L 0 400 Z" fill="#2d1606" />
                        <path d="M 0 120 Q 100 80 200 120 T 400 120 L 400 400 L 0 400 Z" fill="#b91c1c" opacity="0.6">
                            <animateTransform attributeName="transform" type="translate" from="0 0" to="-400 0" dur="3s" repeatCount="indefinite" />
                        </path>
                    </g>
                    <g id="m1-ice" transform="translate(0, 350)" opacity="0">
                        <rect x="180" y="20" width="40" height="40" rx="8" fill="#ffffff" opacity="0.5" transform="rotate(15 200 40)" />
                    </g>
                </g>
                <path d="M 115 90 L 135 345 A 15 15 0 0 0 150 360 L 250 360 A 15 15 0 0 0 265 345 L 285 90" fill="rgba(255,255,255,0.05)" stroke="#475569" stroke-width="8" />
                <rect x="135" y="210" width="130" height="50" rx="6" fill="#000" stroke="#475569" stroke-width="2"/>
                <text x="200" y="245" font-family="Impact" font-size="30" fill="white" text-anchor="middle">MOTOR 1</text>
            </svg>
            <div style="width: 100%; margin-top: 1rem;">
                <button class="btn-activate" onclick="activateEngine(1)">Seleccionar</button>
                <button class="btn-export" onclick="downloadEngine(1)">📥 Exportar M1</button>
            </div>
        </div>

        <!-- MOTOR 2: GROUP TRANSLATE -->
        <div class="glass-wrapper" id="wrapper-2">
            <div class="engine-title">M2: Group Translate<br><sub>El líquido sube como bloque</sub></div>
            <svg viewBox="0 0 400 400" id="svg-engine-2" xmlns="http://www.w3.org/2000/svg">
                <clipPath id="cup-shape-2"><path d="M 120 100 L 140 340 A 10 10 0 0 0 150 350 L 250 350 A 10 10 0 0 0 260 340 L 280 100 Z" /></clipPath>
                <g clip-path="url(#cup-shape-2)">
                    <g id="m2-group" transform="translate(0, 350)">
                        <path d="M 0 0 Q 100 -30 200 0 T 400 0 T 600 0 T 800 0 L 800 400 L 0 400 Z" fill="#0ea5e9" opacity="0.6">
                            <animateTransform attributeName="transform" type="translate" from="0 0" to="-400 0" dur="4s" repeatCount="indefinite" />
                        </path>
                        <path d="M 0 0 Q 100 30 200 0 T 400 0 T 600 0 T 800 0 L 800 400 L 0 400 Z" fill="#0284c7" opacity="0.9">
                            <animateTransform attributeName="transform" type="translate" from="-400 0" to="0 0" dur="3s" repeatCount="indefinite" />
                        </path>
                        <rect x="180" y="20" width="40" height="40" rx="8" fill="#ffffff" opacity="0.5" transform="rotate(15 200 40)" />
                    </g>
                </g>
                <path d="M 115 90 L 135 345 A 15 15 0 0 0 150 360 L 250 360 A 15 15 0 0 0 265 345 L 285 90" fill="rgba(255,255,255,0.05)" stroke="#475569" stroke-width="8" />
                <rect x="135" y="210" width="130" height="50" rx="6" fill="#000" stroke="#475569" stroke-width="2"/>
                <text x="200" y="245" font-family="Impact" font-size="30" fill="white" text-anchor="middle">MOTOR 2</text>
            </svg>
            <div style="width: 100%; margin-top: 1rem;">
                <button class="btn-activate" onclick="activateEngine(2)">Seleccionar</button>
                <button class="btn-export" onclick="downloadEngine(2)">📥 Exportar M2</button>
            </div>
        </div>

        <!-- MOTOR 3: DYNAMIC PATH -->
        <div class="glass-wrapper" id="wrapper-3">
            <div class="engine-title">M3: JS Dynamic Path<br><sub>Redibuja curvas en vivo</sub></div>
            <svg viewBox="0 0 400 400" id="svg-engine-3" xmlns="http://www.w3.org/2000/svg">
                <clipPath id="cup-shape-3"><path d="M 120 100 L 140 340 A 10 10 0 0 0 150 350 L 250 350 A 10 10 0 0 0 260 340 L 280 100 Z" /></clipPath>
                <g clip-path="url(#cup-shape-3)">
                    <!-- Paths controlados 100% por JS -->
                    <path id="m3-wave-back" d="M 0 350 L 400 350 L 400 400 L 0 400 Z" fill="#b45309" opacity="0.6" />
                    <path id="m3-wave-front" d="M 0 350 L 400 350 L 400 400 L 0 400 Z" fill="#f59e0b" opacity="0.9" />
                    <g id="m3-ice" transform="translate(0, 350)" opacity="0">
                        <rect x="180" y="20" width="40" height="40" rx="8" fill="#ffffff" opacity="0.5" transform="rotate(15 200 40)" />
                    </g>
                </g>
                <path d="M 115 90 L 135 345 A 15 15 0 0 0 150 360 L 250 360 A 15 15 0 0 0 265 345 L 285 90" fill="rgba(255,255,255,0.05)" stroke="#475569" stroke-width="8" />
                <rect x="135" y="210" width="130" height="50" rx="6" fill="#000" stroke="#475569" stroke-width="2"/>
                <text x="200" y="245" font-family="Impact" font-size="30" fill="white" text-anchor="middle">MOTOR 3</text>
            </svg>
            <div style="width: 100%; margin-top: 1rem;">
                <button class="btn-activate" onclick="activateEngine(3)">Seleccionar</button>
                <button class="btn-export" onclick="downloadEngine(3)">📥 Exportar M3</button>
            </div>
        </div>

    </div>

    <canvas id="canvas"></canvas>

    <!-- SCRIPTS -->
    <script src="js/engines.js"></script>
</body>
</html>
