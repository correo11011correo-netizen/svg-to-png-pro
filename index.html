<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>Prototipo Vaso Animado | Punto 33</title>
    <style>
        :root {
            --bg: #020617;
            --accent: #10b981;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg);
            color: white;
            font-family: 'Segoe UI', system-ui, sans-serif;
            /* Altura masiva para permitir hacer scroll y animar */
            height: 400vh; 
            overflow-x: hidden;
        }

        /* Textos de fondo que aparecen al hacer scroll */
        .scroll-text {
            position: absolute;
            width: 100%; text-align: center;
            font-size: 3.5rem; font-weight: 900;
            color: rgba(255, 255, 255, 0.05);
            z-index: 0; pointer-events: none;
            letter-spacing: 5px;
        }
        .t1 { top: 20vh; }
        .t2 { top: 150vh; }
        .t3 { top: 280vh; }

        /* Contenedor del vaso fijo en la pantalla */
        .sticky-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100vh;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 10; pointer-events: none;
        }

        .glass-wrapper {
            width: 100%; max-width: 450px; aspect-ratio: 1;
            pointer-events: auto; /* Para permitir clics si es necesario */
            filter: drop-shadow(0 20px 40px rgba(0,0,0,0.8));
        }
        
        .glass-wrapper svg { width: 100%; height: 100%; }

        /* Panel de control flotante */
        .controls {
            position: fixed; bottom: 2rem; right: 2rem; z-index: 20;
            background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px);
            padding: 1.5rem; border-radius: 16px; border: 1px solid #334155;
            display: flex; flex-direction: column; gap: 1rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .controls h3 { margin: 0 0 0.5rem 0; font-size: 1.1rem; color: var(--accent); text-transform: uppercase; }

        select, button {
            padding: 0.8rem 1.2rem; border-radius: 8px; border: 1px solid #334155;
            background: #1e293b; color: white; font-weight: bold; cursor: pointer; outline: none;
        }

        button { background: var(--accent); color: black; border: none; transition: transform 0.2s; }
        button:hover { transform: translateY(-2px); }

        /* Instrucción inicial */
        .scroll-indicator {
            position: fixed; bottom: 3rem; left: 50%; transform: translateX(-50%);
            display: flex; flex-direction: column; align-items: center; gap: 0.5rem;
            color: var(--accent); font-weight: bold; font-size: 1.2rem;
            animation: bounce 2s infinite; z-index: 5;
        }
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0) translateX(-50%); }
            40% { transform: translateY(-20px) translateX(-50%); }
            60% { transform: translateY(-10px) translateX(-50%); }
        }

        canvas { display: none; }
    </style>
</head>
<body>

    <div class="scroll-text t1">SCROLL PARA LLENAR 👇</div>
    <div class="scroll-text t2">PREPARANDO EL TRAGO... 🧊</div>
    <div class="scroll-text t3">¡LISTO PARA DISFRUTAR! 🍻</div>

    <div class="scroll-indicator" id="indicator">
        <span>Scrollea hacia abajo</span>
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M19 12l-7 7-7-7"/></svg>
    </div>

    <div class="sticky-container">
        <div class="glass-wrapper">
            <svg viewBox="0 0 400 400" id="main-svg" xmlns="http://www.w3.org/2000/svg">
                <!-- Máscara de llenado dinámico -->
                <defs>
                    <clipPath id="liquid-mask">
                        <!-- El atributo Y y HEIGHT de este rect se animan con JS -->
                        <rect id="fill-rect" x="0" y="340" width="400" height="0" />
                    </clipPath>
                </defs>
                
                <!-- Fondo para el PNG si se descarga -->
                <rect id="bg-rect" width="400" height="400" fill="#020617"/>

                <!-- GRUPO DEL LÍQUIDO (Oculto por la máscara hasta que haces scroll) -->
                <g clip-path="url(#liquid-mask)">
                    <!-- Forma total del líquido -->
                    <path id="liquid-path" d="M 136 120 L 157 335 L 243 335 L 264 120 Z" fill="#2d1606" opacity="0.95"/>
                    
                    <!-- Hielos flotantes (Se mueven con el nivel del agua en JS) -->
                    <g id="ice-cubes" transform="translate(0, 335)">
                        <rect x="165" y="0" width="40" height="40" rx="6" fill="#ffffff" opacity="0.4" transform="rotate(15 185 20)"/>
                        <rect x="205" y="15" width="35" height="35" rx="6" fill="#ffffff" opacity="0.3" transform="rotate(-20 222 32)"/>
                        <circle cx="170" cy="50" r="4" fill="white" opacity="0.5"/>
                        <circle cx="230" cy="60" r="5" fill="white" opacity="0.5"/>
                    </g>
                </g>

                <!-- Sorbete curvo (Fijo en el vaso) -->
                <path d="M 210 120 L 250 30 L 280 40" fill="none" stroke="#94a3b8" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
                
                <!-- El Vaso Cónico (Plástico/Cristal) -->
                <path d="M 130 80 L 155 340 A 15 15 0 0 0 170 355 L 230 355 A 15 15 0 0 0 245 340 L 270 80" fill="rgba(255,255,255,0.03)" stroke="#334155" stroke-width="8" stroke-linejoin="round"/>
                
                <!-- Brillos y relieve del plástico -->
                <path d="M 145 100 L 165 320" stroke="white" stroke-width="4" opacity="0.2" stroke-linecap="round"/>
                <path d="M 255 100 L 235 320" stroke="white" stroke-width="2" opacity="0.1" stroke-linecap="round"/>
                <line x1="140" y1="120" x2="260" y2="120" stroke="#334155" stroke-width="2" opacity="0.5"/>
                
                <!-- Etiqueta Punto 33 -->
                <rect x="135" y="190" width="130" height="45" rx="5" fill="#000" stroke="#334155" stroke-width="2"/>
                <text x="200" y="222" font-family="Impact" font-size="30" fill="white" text-anchor="middle">PUNTO 33</text>
            </svg>
        </div>
    </div>

    <!-- Panel de control de pruebas -->
    <div class="controls">
        <h3>🧪 Laboratorio</h3>
        <select id="color-select" onchange="updateColor()">
            <option value="#2d1606">Fernet Branca</option>
            <option value="#dc2626">Campari Rojo</option>
            <option value="#fbbf24">Cerveza Rubia</option>
            <option value="#38bdf8">Blue Lagoon</option>
            <option value="#a855f7">Violet Gin</option>
            <option value="#10b981">Menta Tonic</option>
        </select>
        <button onclick="downloadPNG()">📥 Descargar Frame (PNG)</button>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        // LÓGICA DE ANIMACIÓN AL HACER SCROLL
        const fillRect = document.getElementById('fill-rect');
        const iceCubes = document.getElementById('ice-cubes');
        const indicator = document.getElementById('indicator');

        // Constantes del vaso en el SVG
        const vasoBottomY = 340; // Fondo del vaso
        const vasoTopY = 120;    // Tope máximo de llenado
        const maxFillHeight = vasoBottomY - vasoTopY; // 220px de líquido total

        window.addEventListener('scroll', () => {
            // Ocultar la flecha indicadora apenas se empieza a scrollear
            if (window.scrollY > 50) {
                indicator.style.opacity = '0';
                indicator.style.transition = 'opacity 0.3s';
            } else {
                indicator.style.opacity = '1';
            }

            // Calcular porcentaje de scroll (De 0.0 a 1.0)
            const docHeight = document.documentElement.scrollHeight - window.innerHeight;
            const scrollPos = window.scrollY;
            const scrollPercent = Math.min(Math.max(scrollPos / docHeight, 0), 1);

            // Calcular la altura y posición Y de la máscara que revela el líquido
            const currentHeight = maxFillHeight * scrollPercent;
            const currentY = vasoBottomY - currentHeight;

            // Aplicar al rectángulo de la máscara
            fillRect.setAttribute('y', currentY);
            fillRect.setAttribute('height', currentHeight);

            // Hacer que los hielos floten en la superficie del líquido
            // Si el vaso está vacío (currentHeight = 0), los hielos quedan en el fondo (300)
            // A medida que sube, el Y del hielo acompaña a la superficie (currentY)
            let iceY = currentY - 20; 
            if (iceY > 300) iceY = 300; // Limite para que no se salgan por abajo del vaso
            
            // Efecto visual: Si no hay casi líquido, ocultar los hielos
            if (scrollPercent < 0.05) {
                iceCubes.setAttribute('opacity', '0');
            } else {
                iceCubes.setAttribute('opacity', '1');
                iceCubes.setAttribute('transform', \`translate(0, \${iceY})\`);
            }
        });

        // Cambiar color del trago
        function updateColor() {
            const color = document.getElementById('color-select').value;
            document.getElementById('liquid-path').setAttribute('fill', color);
            // También cambiamos el color del texto del logo para que combine
            document.querySelector('text').setAttribute('fill', color);
        }

        // Descargar Frame Exacto en PNG
        function downloadPNG() {
            const svgEl = document.getElementById('main-svg');
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            
            // Para el PNG descargado, forzamos un fondo transparente si lo desean, 
            // pero dejaremos el oscuro para que resalte.
            
            const svgData = new XMLSerializer().serializeToString(svgEl);
            const img = new Image();
            const svgBlob = new Blob([svgData], {type: 'image/svg+xml;charset=utf-8'});
            const url = URL.createObjectURL(svgBlob);

            img.onload = function() {
                canvas.width = 800; // HD
                canvas.height = 800;
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                
                const link = document.createElement('a');
                link.download = \`Punto33_Trago_Animado.png\`;
                link.href = canvas.toDataURL('image/png');
                link.click();
                URL.revokeObjectURL(url);
            };
            img.src = url;
        }

        // Inicializar
        updateColor();
    </script>
</body>
</html>
