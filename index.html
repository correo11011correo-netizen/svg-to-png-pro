    <style>
        :root {
            --bg: #020617; --card-bg: #0f172a; --text: #f8fafc;
            --accent: #10b981; --border: #1e293b;
        }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; }
        header { text-align: center; padding: 3rem 1rem; background: radial-gradient(circle at top, #1e1b4b, #020617); border-bottom: 1px solid var(--border); }
        h1 { margin: 0; font-size: 2.5rem; color: #fff; }
        p { color: #94a3b8; margin-top: 0.5rem; }
        .category-title { font-size: 1.8rem; margin: 3rem 2rem 1rem; padding-bottom: 0.5rem; border-bottom: 2px solid var(--accent); color: var(--accent); text-transform: uppercase; letter-spacing: 2px; }
        .container { max-width: 1400px; margin: 0 auto 2rem; padding: 0 2rem; display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 2.5rem; }
        .logo-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 16px; padding: 1.5rem; display: flex; flex-direction: column; transition: transform 0.3s; }
        .logo-card:hover { transform: translateY(-5px); border-color: var(--accent); box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .preview { background: #fff; border-radius: 12px; height: 260px; display: flex; align-items: center; justify-content: center; margin-bottom: 1.5rem; overflow: hidden; position: relative; }
        .preview svg { width: 100%; height: 100%; max-width: 260px; }
        .controls { display: flex; flex-direction: column; gap: 0.8rem; margin-top: auto; }
        .row { display: flex; gap: 0.5rem; }
        select, button { padding: 0.6rem; border-radius: 8px; border: 1px solid var(--border); background: #1e293b; color: #fff; font-size: 0.9rem; cursor: pointer; }
        button { background: var(--accent); color: #000; font-weight: bold; border: none; transition: opacity 0.2s; }
        button:hover { opacity: 0.8; }
        canvas { display: none; }
    </style>
</head>

        `<rect width="400" height="400" fill="__BG__"/><polygon points="180,60 220,60 220,120 260,180 260,340 140,340 140,180 180,120" fill="none" stroke="__MAIN__" stroke-width="10"/><polygon points="140,240 260,240 260,340 140,340" fill="__SEC__" opacity="0.3"/><text x="200" y="200" font-family="Verdana" font-size="25" font-weight="bold" fill="__TEXT__" text-anchor="middle">PUNTO</text><text x="200" y="310" font-family="Arial" font-size="60" font-weight="bold" fill="__MAIN__" text-anchor="middle">33</text>`,
        // 26: Rombo Premium con Iniciales
        `<rect width="400" height="400" fill="__BG__"/><polygon points="200,40 340,200 200,360 60,200" fill="none" stroke="__MAIN__" stroke-width="12"/><polygon points="200,60 320,200 200,340 80,200" fill="none" stroke="__SEC__" stroke-width="4"/><text x="200" y="180" font-family="Georgia" font-size="50" font-weight="bold" fill="__TEXT__" text-anchor="middle">PUNTO</text><text x="200" y="270" font-family="Impact" font-size="90" fill="__MAIN__" text-anchor="middle">33</text>`,
        // 27: Botella de Champagne Premium
        `<rect width="400" height="400" fill="__BG__"/><path d="M 170 60 L 230 60 L 230 90 L 180 160 L 180 340 L 120 340 L 120 160 L 170 90 Z" fill="__MAIN__" transform="translate(30, 0)"/><path d="M 170 60 L 230 60 L 230 120 L 170 120 Z" fill="__HL__" transform="translate(30, 0)"/><circle cx="120" cy="180" r="8" fill="__SEC__"/><circle cx="100" cy="220" r="12" fill="__SEC__"/><circle cx="140" cy="260" r="6" fill="__SEC__"/><text x="200" y="280" font-family="Times New Roman" font-size="45" font-weight="bold" fill="__BG__" text-anchor="middle">33</text>`,
        // 28: Emblema Hexagonal Cervecero
        `<rect width="400" height="400" fill="__BG__"/><polygon points="200,50 330,125 330,275 200,350 70,275 70,125" fill="none" stroke="__MAIN__" stroke-width="12"/><path d="M 140 170 Q 200 280 260 170" fill="none" stroke="__SEC__" stroke-width="8"/><text x="200" y="150" font-family="Arial" font-size="30" font-weight="bold" fill="__TEXT__" text-anchor="middle">PUNTO</text><text x="200" y="250" font-family="Impact" font-size="90" fill="__MAIN__" text-anchor="middle">33</text>`,
        // 29: Cinta Líquida (Monograma Fluido)
        `<rect width="400" height="400" fill="__BG__"/><path d="M 100 200 C 100 100 300 100 300 200 C 300 300 100 300 200 300 C 250 300 250 200 200 200" fill="none" stroke="__MAIN__" stroke-width="20" stroke-linecap="round"/><path d="M 120 200 C 120 120 280 120 280 200 C 280 280 120 280 200 280" fill="none" stroke="__SEC__" stroke-width="8"/><text x="200" y="220" font-family="Arial" font-size="60" font-weight="bold" fill="__BG__" text-anchor="middle">33</text>`
    ];

    const grid = document.getElementById('grid-container');

    categories.forEach(cat => {
        const title = document.createElement('div');
        title.className = 'category-title';
        title.textContent = cat.name;
        grid.appendChild(title);

        for (let i = cat.start; i <= cat.end; i++) {
            const card = document.createElement('div');
            card.className = 'logo-card';
            card.innerHTML = `
                <div class="preview" id="prev-${i}"></div>
                <h3 style="margin: 0 0 1rem 0; font-size: 1.1rem; color: #fff;">Logo Concepto #${i + 1}</h3>
                <div class="controls">
                    <div class="row">
                        <select id="color-${i}" onchange="updateSvg(${i})" style="flex:1">
                            <option value="original">🎨 Clásico (Verde)</option>
                            <option value="dark">🌙 Dark Mode</option>
                            <option value="gold">🏆 Dorado Premium</option>
                            <option value="neon">🌈 Neón Night</option>
                            <option value="mono">🖤 Blanco y Negro</option>
                        </select>
                        <select id="scale-${i}">
                            <option value="2">HD (800px)</option>
                            <option value="4">Full HD (1600px)</option>
                            <option value="8">4K (3200px)</option>
                        </select>
                    </div>
                    <button onclick="downloadPng(${i})">⬇️ DESCARGAR PNG</button>
                </div>
            `;
            grid.appendChild(card);
            updateSvg(i);
        }
    });

    function updateSvg(index) {
        const palette = document.getElementById(`color-${index}`).value;
        const c = palettes[palette];
        let svgStr = templates[index]
            .replace(/__BG__/g, c.bg)
            .replace(/__MAIN__/g, c.main)
            .replace(/__SEC__/g, c.sec)
            .replace(/__HL__/g, c.hl)
            .replace(/__TEXT__/g, c.text);
        
        document.getElementById(`prev-${index}`).innerHTML = 
            `<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg" id="svg-${index}">${svgStr}</svg>`;
    }

    function downloadPng(index) {
        const svgEl = document.getElementById(`svg-${index}`);
        const scale = parseFloat(document.getElementById(`scale-${index}`).value);
        const paletteName = document.getElementById(`color-${index}`).value;
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        const svgData = new XMLSerializer().serializeToString(svgEl);
        const img = new Image();
        const svgBlob = new Blob([svgData], { type: 'image/svg+xml;charset=utf-8' });
        const url = URL.createObjectURL(svgBlob);

        img.onload = function() {
            canvas.width = 400 * scale;
            canvas.height = 400 * scale;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            
            const link = document.createElement('a');
            link.download = `Punto33_Logo_${index+1}_${paletteName}_${canvas.width}px.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
            URL.revokeObjectURL(url);
        };
        img.src = url;
    }
</script>

</body>
