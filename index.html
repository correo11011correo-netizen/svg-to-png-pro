<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo de Logos | Punto 33</title>
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f8fafc;
            --accent: #10b981;
            --border: #334155;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
        }

        header {
            text-align: center;
            padding: 3rem 1rem;
            background: linear-gradient(to bottom, #020617, var(--bg));
            border-bottom: 1px solid var(--border);
        }

        h1 { margin: 0; font-size: 2.5rem; color: #fff; }
        p { color: #94a3b8; font-size: 1.1rem; margin-top: 0.5rem; }

        .container {
            max-width: 1400px;
            margin: 3rem auto;
            padding: 0 2rem;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
        }

        .logo-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.5rem;
            text-align: center;
            transition: transform 0.3s;
            display: flex;
            flex-direction: column;
        }

        .logo-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent);
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        .svg-container {
            background: #ffffff; /* Fondo blanco para contraste de los logos */
            border-radius: 12px;
            padding: 1rem;
            margin-bottom: 1.5rem;
            height: 250px;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: radial-gradient(#e2e8f0 1px, transparent 1px);
            background-size: 20px 20px;
            overflow: hidden;
        }

        .svg-container.dark-bg { background: #0b0f19; background-image: radial-gradient(#1e293b 1px, transparent 1px); }

        .svg-container svg {
            width: 100%;
            height: 100%;
            max-width: 250px;
        }

        .card-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 1rem;
        }

        .controls {
            margin-top: auto;
            display: flex;
            gap: 0.5rem;
            justify-content: center;
            align-items: center;
        }

        select {
            background: #0f172a;
            color: white;
            border: 1px solid var(--border);
            padding: 0.6rem;
            border-radius: 8px;
            outline: none;
        }

        button {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 0.6rem 1.2rem;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        button:hover { opacity: 0.8; }
        
        /* Oculto para conversión */
        canvas { display: none; }
    </style>
</head>

<canvas id="canvas"></canvas>

<script>
    function downloadLogo(containerId, scaleSelectId, filename) {
        const container = document.getElementById(containerId);
        const svgEl = container.querySelector('svg');
        const scale = parseFloat(document.getElementById(scaleSelectId).value);
        
        const svgData = new XMLSerializer().serializeToString(svgEl);
        const svgBlob = new Blob([svgData], { type: 'image/svg+xml;charset=utf-8' });
        const url = URL.createObjectURL(svgBlob);
        
        const img = new Image();
        img.onload = function() {
            const canvas = document.getElementById('canvas');
            // Dimensiones base del viewBox (400x400)
            const width = 400 * scale;
            const height = 400 * scale;
            
            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext('2d');
            
            ctx.clearRect(0, 0, width, height);
            ctx.drawImage(img, 0, 0, width, height);
            
            const pngUrl = canvas.toDataURL('image/png');
            const downloadLink = document.createElement('a');
            downloadLink.href = pngUrl;
            downloadLink.download = `${filename}_${width}x${height}.png`;
            document.body.appendChild(downloadLink);
            downloadLink.click();
            document.body.removeChild(downloadLink);
            URL.revokeObjectURL(url);
            
            // Console log para registro
            console.log(`[EXITO] Logo ${filename} descargado a ${width}x${height}px`);
        };
        img.src = url;
    }
</script>
