<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Punto 33 | Logo Lab Vasos de Previa</title>
    <style>
        :root {
            --bg: #020617; --card-bg: #0f172a; --text: #f8fafc;
            --accent: #10b981; --border: #1e293b;
        }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; }
        header { text-align: center; padding: 3rem 1rem; background: radial-gradient(circle at top, #1e1b4b, #020617); border-bottom: 1px solid var(--border); }
        h1 { margin: 0; font-size: 2.5rem; color: #fff; }
        p { color: #94a3b8; margin-top: 0.5rem; }
        .container { max-width: 1400px; margin: 0 auto 2rem; padding: 0 2rem; display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 2.5rem; }
        .logo-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 16px; padding: 1.5rem; display: flex; flex-direction: column; transition: transform 0.3s; }
        .logo-card:hover { transform: translateY(-5px); border-color: var(--accent); box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
        .preview { background: #fff; border-radius: 12px; height: 300px; display: flex; align-items: center; justify-content: center; margin-bottom: 1.5rem; overflow: hidden; position: relative; }
        .preview svg { width: 100%; height: 100%; max-width: 280px; }
        .controls { display: flex; flex-direction: column; gap: 0.8rem; margin-top: auto; }
        .row { display: flex; gap: 0.5rem; }
        select, button { padding: 0.6rem; border-radius: 8px; border: 1px solid var(--border); background: #1e293b; color: #fff; font-size: 0.9rem; cursor: pointer; }
        button { background: var(--accent); color: #000; font-weight: bold; border: none; transition: opacity 0.2s; }
        button:hover { opacity: 0.8; }
        canvas { display: none; }
    </style>
</head>
<body>

<header>
    <h1>Punto 33 | Logo Lab: Edición Vasos</h1>
    <p>30 Tragos en vaso cónico transparente. Elige el estilo de bebida y descarga.</p>
</header>

<div class="container" id="grid-container"></div>
<canvas id="canvas"></canvas>

<script>
    // Colores de bebidas temáticas
    const drinkColors = [
        "#422006", "#dc2626", "#0891b2", "#f59e0b", "#65a30d", "#7c3aed", "#db2777", "#2563eb", "#ea580c", "#16a34a",
        "#854d0e", "#be123c", "#0369a1", "#d97706", "#4d7c0f", "#6d28d9", "#9f1239", "#1d4ed8", "#c2410c", "#15803d",
        "#713f12", "#991b1b", "#075985", "#b45309", "#3f6212", "#5b21b6", "#881337", "#1e40af", "#9a3412", "#166534"
    ];

    // Paletas de estilo para el VASO y acentos
    const palettes = {
        crystal: { cup: "rgba(200,220,255,0.3)", stroke: "#94a3b8", ice: "#e2e8f0" },
        neon: { cup: "rgba(255,255,255,0.1)", stroke: "#f472b6", ice: "#38bdf8" },
        gold: { cup: "rgba(212,175,55,0.1)", stroke: "#d4af37", ice: "#fef08a" },
        dark: { cup: "rgba(0,0,0,0.2)", stroke: "#334155", ice: "#ffffff" }
    };

    function generateVasoSVG(index, paletteKey) {
        const drinkColor = drinkColors[index];
        const p = palettes[paletteKey];
        
        // Estructura base del vaso cónico
        const cupPath = "M 130 80 L 155 340 A 15 15 0 0 0 170 355 L 230 355 A 15 15 0 0 0 245 340 L 270 80";
        const liquidPath = "M 138 160 L 157 335 L 243 335 L 262 160 Z";
        
        // Variaciones de contenido (hielos, sorbetes, etc)
        let extras = "";
        if (index % 3 === 0) { // Con sorbete curvo
            extras += `<path d="M 220 160 L 260 40 L 290 45" fill="none" stroke="${p.stroke}" stroke-width="8" stroke-linecap="round"/>`;
        } else if (index % 3 === 1) { // Con doble sorbete
            extras += `<line x1="180" y1="160" x2="200" y2="50" stroke="${p.stroke}" stroke-width="6" stroke-linecap="round"/>`;
            extras += `<line x1="195" y1="160" x2="215" y2="50" stroke="${p.stroke}" stroke-width="6" stroke-linecap="round"/>`;
        }

        if (index % 2 === 0) { // Con rodaja de limón/naranja
            extras += `<circle cx="260" cy="110" r="35" fill="none" stroke="${drinkColor}" stroke-width="4" opacity="0.6"/>`;
            extras += `<line x1="260" y1="75" x2="260" y2="145" stroke="${drinkColor}" stroke-width="1" opacity="0.4"/>`;
        }

        // Hielos detallados
        const ice = `<rect x="170" y="220" width="40" height="40" rx="5" fill="${p.ice}" opacity="0.4" transform="rotate(15 190 240)"/>
                     <rect x="200" y="270" width="35" height="35" rx="5" fill="${p.ice}" opacity="0.3" transform="rotate(-10 217 287)"/>`;

        return `
        <svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
            <rect width="400" height="400" fill="white"/>
            <!-- Bebida -->
            <path d="${liquidPath}" fill="${drinkColor}" opacity="0.9"/>
            <!-- Hielos -->
            ${ice}
            <!-- Vaso -->
            <path d="${cupPath}" fill="${p.cup}" stroke="${p.stroke}" stroke-width="6" stroke-linejoin="round"/>
            <!-- Detalles de plástico -->
            <line x1="140" y1="120" x2="260" y2="120" stroke="${p.stroke}" stroke-width="2" opacity="0.3"/>
            <line x1="145" y1="160" x2="255" y2="160" stroke="${p.stroke}" stroke-width="2" opacity="0.3"/>
            <!-- Extras -->
            ${extras}
            <!-- Texto Punto 33 -->
            <rect x="140" y="200" width="120" height="40" fill="white" opacity="0.9" rx="5"/>
            <text x="200" y="230" font-family="Impact" font-size="28" fill="#000" text-anchor="middle">PUNTO 33</text>
        </svg>`;
    }

    const grid = document.getElementById('grid-container');

    for (let i = 0; i < 30; i++) {
        const card = document.createElement('div');
        card.className = 'logo-card';
        card.innerHTML = `
            <div class="preview" id="prev-${i}"></div>
            <h3 style="margin:0 0 1rem 0; font-size:1.1rem;">Trago #${i + 1}</h3>
            <div class="controls">
                <div class="row">
                    <select id="style-${i}" onchange="renderLogo(${i})" style="flex:1">
                        <option value="crystal">💎 Cristalino</option>
                        <option value="neon">🌈 Neón Glam</option>
                        <option value="gold">🏆 Edición Oro</option>
                        <option value="dark">🌑 Elegante Dark</option>
                    </select>
                    <select id="scale-${i}">
                        <option value="4">HD (1600px)</option>
                        <option value="8">4K (3200px)</option>
                    </select>
                </div>
                <button onclick="downloadLogo(${i})">⬇️ DESCARGAR PNG</button>
            </div>
        `;
        grid.appendChild(card);
        renderLogo(i);
    }

    function renderLogo(idx) {
        const style = document.getElementById(`style-${idx}`).value;
        document.getElementById(`prev-${idx}`).innerHTML = generateVasoSVG(idx, style);
    }

    function downloadLogo(idx) {
        const svgEl = document.getElementById(`prev-${idx}`).querySelector('svg');
        const scale = document.getElementById(`scale-${idx}`).value;
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        const svgData = new XMLSerializer().serializeToString(svgEl);
        const img = new Image();
        const svgBlob = new Blob([svgData], {type: 'image/svg+xml;charset=utf-8'});
        const url = URL.createObjectURL(svgBlob);

        img.onload = function() {
            canvas.width = 400 * scale;
            canvas.height = 400 * scale;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            
            const link = document.createElement('a');
            link.download = `Punto33_Trago_Vaso_${idx+1}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
            URL.revokeObjectURL(url);
        };
        img.src = url;
    }
</script>

</body>
</html>
