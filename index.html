<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>Liquid Engine v6.0 | Olas Vivas</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <header>
        <h1>🌊 Punto 33 | Olas Vivas</h1>
        <p>Motor de físicas líquidas continuas. ¡El líquido nunca se detiene!</p>
    </header>

    <div class="main-layout">
        <!-- ÁREA DEL VASO -->
        <div class="glass-display">
            <svg viewBox="0 0 400 400" id="main-svg" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <clipPath id="cup-shape">
                        <path d="M 120 100 L 140 340 A 10 10 0 0 0 150 350 L 250 350 A 10 10 0 0 0 260 340 L 280 100 Z" />
                    </clipPath>
                </defs>

                <!-- Fondo Negro Vaso -->
                <path d="M 120 100 L 140 340 A 10 10 0 0 0 150 350 L 250 350 A 10 10 0 0 0 260 340 L 280 100 Z" fill="#000" opacity="0.3"/>

                <!-- GRUPO LÍQUIDO ENMASCARADO -->
                <g clip-path="url(#cup-shape)">
                    <!-- Ola Trasera (Controlada por JS Frame a Frame) -->
                    <path id="wave-path-back" d="" fill="#991b1b" opacity="0.8"/>
                    
                    <!-- Ola Frontal (Controlada por JS Frame a Frame) -->
                    <path id="wave-path-front" d="" fill="#dc2626" opacity="0.95"/>
                    
                    <!-- Hielos -->
                    <g id="ice-group" transform="translate(0, 350)">
                        <rect x="175" y="0" width="45" height="45" rx="8" fill="white" opacity="0.4" transform="rotate(15 197 22)"/>
                        <rect x="210" y="10" width="35" height="35" rx="8" fill="white" opacity="0.3" transform="rotate(-10 227 27)"/>
                    </g>
                </g>

                <!-- Vaso Físico Frontal -->
                <path d="M 115 90 L 135 345 A 15 15 0 0 0 150 360 L 250 360 A 15 15 0 0 0 265 345 L 285 90" fill="rgba(255,255,255,0.05)" stroke="#475569" stroke-width="8" />
                
                <!-- Etiqueta Punto 33 -->
                <rect x="135" y="210" width="130" height="50" rx="6" fill="#000" stroke="#475569" stroke-width="2"/>
                <text x="200" y="245" font-family="Impact" font-size="30" fill="white" text-anchor="middle">PUNTO 33</text>
            </svg>
        </div>

        <div class="scroll-msg">⬇️ SCROLLEA PARA LLENAR EL VASO ⬇️</div>

        <!-- PANEL DE CONTROL -->
        <div class="control-box">
            <div class="slider-container">
                <label>Controlador de Nivel (Slider Manual):</label>
                <input type="range" id="manual-slider" min="0" max="100" value="0">
            </div>

            <button class="btn-download" onclick="downloadPNG()">📸 Capturar Foto de la Ola (PNG)</button>
        </div>
    </div>

    <canvas id="canvas"></canvas>
    
    <!-- Lógica de Olas Matemáticas (60fps) -->
    <script src="js/app.js"></script>
</body>
</html>
