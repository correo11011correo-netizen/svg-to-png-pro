<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>Punto 33 | Liquid Engine</title>
    <style>
        :root { --bg: #020617; --accent: #10b981; --card: #0f172a; }
        body { margin: 0; padding: 0; background-color: var(--bg); color: white; font-family: 'Segoe UI', system-ui, sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; }
        header { text-align: center; padding: 2rem 1rem; width: 100%; border-bottom: 1px solid #1e293b; background: linear-gradient(to bottom, #1e1b4b, var(--bg)); }
        h1 { margin: 0; font-size: 2.2rem; color: #fff; }
        p { color: #94a3b8; margin-top: 0.5rem; }

        .lab-container { display: flex; flex-wrap: wrap; gap: 3rem; margin: 3rem auto; padding: 0 2rem; max-width: 1000px; width: 100%; justify-content: center; }

        .glass-container {
            width: 100%; max-width: 400px; aspect-ratio: 1;
            background: radial-gradient(circle, #1e293b 0%, var(--bg) 70%);
            border-radius: 24px; box-shadow: 0 0 50px rgba(0,0,0,0.8) inset;
            display: flex; align-items: center; justify-content: center;
            border: 1px solid #1e293b;
        }

        svg { width: 100%; height: 100%; filter: drop-shadow(0 20px 30px rgba(0,0,0,0.5)); }

        .controls {
            background: var(--card); padding: 2rem; border-radius: 20px;
            border: 1px solid #1e293b; display: flex; flex-direction: column; gap: 1.5rem;
            min-width: 300px; flex: 1;
        }
        
        .controls h3 { margin: 0; color: var(--accent); text-transform: uppercase; font-size: 1.1rem; }
        .controls label { font-size: 0.85rem; color: #94a3b8; font-weight: bold; text-transform: uppercase; }

        select, button {
            width: 100%; padding: 1rem; border-radius: 12px; border: 1px solid #334155;
            background: var(--bg); color: white; font-weight: bold; font-size: 1rem; cursor: pointer; outline: none;
        }

        .btn-action { background: #3b82f6; color: white; border: none; transition: transform 0.2s; }
        .btn-action:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(59, 130, 246, 0.3); }

        .btn-download { background: var(--accent); color: black; border: none; margin-top: auto; }
        .btn-download:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(16, 185, 129, 0.3); }

        canvas { display: none; }
    </style>
</head>
<body>

    <header>
        <h1>🧪 Liquid Engine | Punto 33</h1>
        <p>Motor de físicas líquidas con SVG. El vaso se llena automáticamente.</p>
    </header>

    <div class="lab-container">
        <!-- VISTA PREVIA DEL VASO -->
        <div class="glass-container">
            <svg viewBox="0 0 400 400" id="main-svg" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <!-- Clip Path con la forma INTERNA del vaso para que el líquido no se salga -->
                    <clipPath id="cup-inner">
                        <path d="M 115 105 L 140 340 A 10 10 0 0 0 150 350 L 250 350 A 10 10 0 0 0 260 340 L 285 105 Z" />
                    </clipPath>
                </defs>

                <!-- Sorbete Fondo -->
                <path d="M 230 140 L 270 40 L 300 50" fill="none" stroke="#94a3b8" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>

                <!-- GRUPO DEL LÍQUIDO (Enmascarado por la forma del vaso) -->
                <g clip-path="url(#cup-inner)">
                    <!-- Fondo oscuro del líquido para dar profundidad -->
                    <path d="M 0 0 L 400 0 L 400 400 L 0 400 Z" fill="#000000" opacity="0.3"/>
                    
                    <!-- EJE Y ANIMADO DEL LÍQUIDO (Sube y baja) -->
                    <g id="liquid-level" style="transform: translateY(350px); transition: transform 2.5s cubic-bezier(0.25, 1, 0.5, 1);">
                        
                        <!-- OLA TRASERA (Más oscura, diferente velocidad) -->
                        <path id="wave-back" d="M 0 50 Q 100 0 200 50 T 400 50 T 600 50 T 800 50 L 800 400 L 0 400 Z" fill="#b91c1c" opacity="0.6">
                            <!-- Animación infinita moviendo la ola a la izquierda -->
                            <animateTransform attributeName="transform" type="translate" from="0 0" to="-400 0" dur="4s" repeatCount="indefinite" />
                        </path>

                        <!-- OLA FRONTAL (Color principal) -->
                        <path id="wave-front" d="M 0 50 Q 100 80 200 50 T 400 50 T 600 50 T 800 50 L 800 400 L 0 400 Z" fill="#ef4444" opacity="0.9">
                            <animateTransform attributeName="transform" type="translate" from="-400 0" to="0 0" dur="3s" repeatCount="indefinite" />
                        </path>

                        <!-- BURBUJAS -->
                        <g fill="white" opacity="0.5">
                            <circle cx="160" cy="150" r="4">
                                <animate attributeName="cy" values="150;50" dur="2s" repeatCount="indefinite" />
                                <animate attributeName="opacity" values="0.5;0" dur="2s" repeatCount="indefinite" />
                            </circle>
                            <circle cx="210" cy="200" r="6">
                                <animate attributeName="cy" values="200;60" dur="2.5s" repeatCount="indefinite" />
                                <animate attributeName="opacity" values="0.5;0" dur="2.5s" repeatCount="indefinite" />
                            </circle>
                            <circle cx="240" cy="180" r="3">
                                <animate attributeName="cy" values="180;70" dur="1.8s" repeatCount="indefinite" />
                                <animate attributeName="opacity" values="0.5;0" dur="1.8s" repeatCount="indefinite" />
                            </circle>
                        </g>

                        <!-- HIELOS FLOTANTES (Suben con el nivel del líquido y flotan en la ola) -->
                        <g opacity="0.8">
                            <rect x="140" y="30" width="45" height="45" rx="8" fill="#ffffff" opacity="0.6" transform="rotate(15 160 50)">
                                <animateTransform attributeName="transform" type="rotate" values="10 160 50; 25 160 50; 10 160 50" dur="4s" repeatCount="indefinite" />
                                <animate attributeName="y" values="30; 45; 30" dur="3s" repeatCount="indefinite" />
                            </rect>
                            <rect x="190" y="50" width="40" height="40" rx="8" fill="#ffffff" opacity="0.5" transform="rotate(-15 210 70)">
                                <animate attributeName="y" values="50; 35; 50" dur="3.5s" repeatCount="indefinite" />
                            </rect>
                        </g>

                    </g>
                </g>

                <!-- Vaso Físico (Plástico/Cristal Frontal) -->
                <path d="M 110 100 L 135 345 A 15 15 0 0 0 150 360 L 250 360 A 15 15 0 0 0 265 345 L 290 100" fill="rgba(255,255,255,0.05)" stroke="#475569" stroke-width="8" stroke-linejoin="round"/>
                
                <!-- Brillos del Vaso -->
                <path d="M 130 120 L 150 330" stroke="white" stroke-width="6" opacity="0.3" stroke-linecap="round"/>
                <path d="M 270 120 L 250 330" stroke="white" stroke-width="2" opacity="0.1" stroke-linecap="round"/>
                <line x1="115" y1="130" x2="285" y2="130" stroke="#475569" stroke-width="3" opacity="0.5"/>
                <line x1="120" y1="170" x2="280" y2="170" stroke="#475569" stroke-width="3" opacity="0.5"/>

                <!-- Etiqueta Punto 33 Frontal -->
                <rect x="135" y="210" width="130" height="50" rx="6" fill="#000" stroke="#475569" stroke-width="2"/>
                <text x="200" y="245" font-family="Impact" font-size="32" fill="white" text-anchor="middle">PUNTO 33</text>
            </svg>
        </div>

        <!-- CONTROLES -->
        <div class="controls">
            <div>
                <label>1. Tipo de Bebida</label>
                <select id="color-select" onchange="updateDrink()">
                    <option value='{"front":"#dc2626", "back":"#991b1b"}'>Campari / Frutos Rojos</option>
                    <option value='{"front":"#f59e0b", "back":"#b45309"}'>Cerveza Rubia</option>
                    <option value='{"front":"#2d1606", "back":"#1a0d04"}'>Fernet / Cola</option>
                    <option value='{"front":"#0ea5e9", "back":"#0284c7"}'>Blue Lagoon</option>
                    <option value='{"front":"#8b5cf6", "back":"#6d28d9"}'>Gin Violeta</option>
                    <option value='{"front":"#10b981", "back":"#047857"}'>Menta / Mojito</option>
                </select>
            </div>

            <div>
                <label>2. Acción de Llenado</label>
                <div style="display: flex; gap: 1rem; margin-top: 0.5rem;">
                    <button class="btn-action" onclick="fillGlass(80)">🌊 Llenar Vaso</button>
                    <button class="btn-action" style="background: #334155;" onclick="fillGlass(350)">🕳️ Vaciar</button>
                </div>
            </div>

            <button class="btn-download" onclick="downloadPNG()">
                📥 DESCARGAR LOGO PNG (Estado Actual)
            </button>
        </div>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        const liquidLevel = document.getElementById('liquid-level');
        const waveFront = document.getElementById('wave-front');
        const waveBack = document.getElementById('wave-back');

        // Función para subir/bajar el nivel del líquido usando CSS Translate
        function fillGlass(yPos) {
            // yPos: 80 = lleno, 350 = vacío
            liquidLevel.style.transform = \`translateY(\${yPos}px)\`;
        }

        // Cambiar el color de las olas
        function updateDrink() {
            const data = JSON.parse(document.getElementById('color-select').value);
            waveFront.setAttribute('fill', data.front);
            waveBack.setAttribute('fill', data.back);
            document.querySelector('text').setAttribute('fill', data.front); // Pinta la letra
        }

        // Descarga Robustecida para SVG con animaciones y clip-paths
        function downloadPNG() {
            const svgEl = document.getElementById('main-svg');
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            
            // Pausar animaciones temporalmente para tomar la "foto" exacta
            document.querySelectorAll('animate, animateTransform').forEach(anim => {
                if(anim.ownerSVGElement) anim.ownerSVGElement.pauseAnimations();
            });

            // Serializar de forma segura
            const svgData = new XMLSerializer().serializeToString(svgEl);
            
            // Usar encodeURIComponent y data URI suele ser más robusto para clip-paths que el Blob en algunos navegadores
            const encodedData = encodeURIComponent(svgData);
            const img = new Image();
            
            img.onload = function() {
                canvas.width = 1600; // 4K Ready
                canvas.height = 1600;
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                
                const link = document.createElement('a');
                link.download = \`Punto33_Trago_Liquid.png\`;
                link.href = canvas.toDataURL('image/png');
                link.click();
                
                // Reanudar animaciones
                document.querySelectorAll('animate, animateTransform').forEach(anim => {
                    if(anim.ownerSVGElement) anim.ownerSVGElement.unpauseAnimations();
                });
            };
            
            img.src = "data:image/svg+xml;charset=utf-8," + encodedData;
        }

        // Iniciar: Al cargar la página esperamos medio segundo y llenamos el vaso
        window.onload = () => {
            updateDrink();
            setTimeout(() => {
                fillGlass(80); // Llenar al nivel 80 (casi hasta el borde)
            }, 500);
        };
    </script>
</body>
</html>
