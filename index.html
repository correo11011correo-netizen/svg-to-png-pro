<!DOCTYPE html>
<html lang="es">
<head>
    <!-- ANTI CACHE TAGS -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mega Catálogo Logos | Punto 33</title>
    <style>
        :root {
            --bg: #020617;
            --card-bg: #0f172a;
            --text: #f8fafc;
            --accent: #10b981;
            --border: #1e293b;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0; padding: 0;
        }

        header {
            text-align: center;
            padding: 4rem 1rem;
            background: radial-gradient(circle at top, #1e1b4b, #020617);
            border-bottom: 1px solid var(--border);
        }

        .category-title {
            grid-column: 1 / -1;
            font-size: 1.8rem;
            margin-top: 3rem;
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid var(--accent);
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 2.5rem;
        }

        .logo-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 1.5rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
        }

        .logo-card:hover {
            transform: translateY(-8px);
            border-color: var(--accent);
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }

        .preview {
            background: #fff;
            border-radius: 12px;
            height: 240px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1.5rem;
            position: relative;
            overflow: hidden;
            background-image: 
                linear-gradient(45deg, #f1f5f9 25%, transparent 25%), 
                linear-gradient(-45deg, #f1f5f9 25%, transparent 25%), 
                linear-gradient(45deg, transparent 75%, #f1f5f9 75%), 
                linear-gradient(-45deg, transparent 75%, #f1f5f9 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
        }

        .preview.dark-mode { background: #000; background-image: none; }

        svg { width: 80%; height: 80%; }

        .card-info { margin-bottom: 1rem; }
        .card-info h3 { margin: 0; font-size: 1.1rem; color: #fff; }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }

        .row { display: flex; gap: 0.5rem; }

        select, button {
            padding: 0.6rem;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: #1e293b;
            color: #fff;
            font-size: 0.85rem;
            cursor: pointer;
        }

        button.primary {
            background: var(--accent);
            color: #000;
            font-weight: 700;
            border: none;
            flex: 1;
        }

        button.primary:hover { filter: brightness(1.1); }

        canvas { display: none; }
    </style>
</head>
<body>

<header>
    <h1>Punto 33 | Logo Lab</h1>
    <p>30 Conceptos Premium. Personaliza colores y descarga en alta resolución.</p>
</header>

<div class="container" id="logo-grid">
    <!-- El contenido se generará vía JavaScript para manejar los 30 logos eficientemente -->
</div>

<canvas id="conversion-canvas"></canvas>

<script>
    const colors = {
        original: { main: '#10b981', secondary: '#0f172a', text: '#0f172a', bg: '#ffffff' },
        gold: { main: '#d4af37', secondary: '#1a1a1a', text: '#d4af37', bg: '#000000' },
        neon: { main: '#f472b6', secondary: '#38bdf8', text: '#fff', bg: '#000000' },
        mono: { main: '#000000', secondary: '#666666', text: '#000000', bg: '#ffffff' }
    };

    const categories = [
        { name: "Minimalistas", count: 8 },
        { name: "Nocturnos & Neón", count: 8 },
        { name: "Vintage & Cerveceros", count: 7 },
        { name: "Abstractos & Premium", count: 7 }
    ];

    // Plantillas de SVGs (Simplified represention for the loop)
    function getSvg(index, palette) {
        const c = colors[palette];
        // Aquí definimos 30 variantes lógicas basadas en el index
        let content = '';
        
        if (index < 8) { // MINIMALISTAS
            if (index === 0) content = `<circle cx="200" cy="200" r="150" fill="none" stroke="${c.main}" stroke-width="15"/><text x="200" y="220" font-family="Arial" font-size="120" font-weight="900" fill="${c.text}" text-anchor="middle">33</text>`;
            if (index === 1) content = `<rect x="50" y="50" width="300" height="300" rx="40" fill="${c.main}"/><text x="200" y="180" font-family="Verdana" font-size="60" fill="${c.bg}" text-anchor="middle">PUNTO</text><text x="200" y="280" font-family="Verdana" font-size="100" font-weight="bold" fill="${c.bg}" text-anchor="middle">33</text>`;
            if (index === 2) content = `<path d="M100 200 L300 200" stroke="${c.main}" stroke-width="20"/><text x="200" y="160" font-family="Impact" font-size="80" fill="${c.text}" text-anchor="middle">PUNTO</text><text x="200" y="320" font-family="Impact" font-size="120" fill="${c.main}" text-anchor="middle">33</text>`;
            else content = `<text x="200" y="200" font-family="Arial" font-size="150" font-weight="bold" fill="${c.main}" text-anchor="middle">.33</text>`;
        } else if (index < 16) { // NOCTURNOS
            content = `<rect width="400" height="400" fill="${c.bg}"/><text x="200" y="240" font-family="Courier" font-size="90" fill="${c.main}" text-anchor="middle" style="filter:drop-shadow(0 0 10px ${c.main})">P33</text>`;
        } else { // RESTO
            content = `<path d="M200 50 L350 300 L50 300 Z" fill="${c.main}" opacity="0.2"/><text x="200" y="250" font-family="Serif" font-size="100" fill="${c.text}" text-anchor="middle">Punto 33</text>`;
        }

        return `<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg" id="svg-${index}">${index < 16 && palette !== 'mono' && palette !== 'original' ? `<rect width="400" height="400" fill="${c.bg}"/>` : `<rect width="400" height="400" fill="${c.bg}"/>`}${content}</svg>`;
    }

    const grid = document.getElementById('logo-grid');
    let currentIdx = 0;

    categories.forEach(cat => {
        const title = document.createElement('div');
        title.className = 'category-title';
        title.textContent = cat.name;
        grid.appendChild(title);

        for (let i = 0; i < cat.count; i++) {
            const idx = currentIdx++;
            const card = document.createElement('div');
            card.className = 'logo-card';
            card.innerHTML = `
                <div class="preview" id="prev-${idx}">${getSvg(idx, 'original')}</div>
                <div class="card-info">
                    <h3>Logo Concepto #${idx + 1}</h3>
                </div>
                <div class="controls">
                    <div class="row">
                        <select onchange="updateLogo(${idx}, this.value)" style="flex:1">
                            <option value="original">🎨 Original</option>
                            <option value="gold">🏆 Dorado Premium</option>
                            <option value="neon">🌈 Neón Night</option>
                            <option value="mono">🖤 B&N</option>
                        </select>
                        <select id="scale-${idx}">
                            <option value="2">800px</option>
                            <option value="4">1600px</option>
                            <option value="8">3200px (4K)</option>
                        </select>
                    </div>
                    <button class="primary" onclick="download(${idx})">📥 DESCARGAR PNG</button>
                </div>
            `;
            grid.appendChild(card);
        }
    });

    function updateLogo(idx, palette) {
        const container = document.getElementById(`prev-${idx}`);
        container.innerHTML = getSvg(idx, palette);
        if (palette === 'gold' || palette === 'neon') container.classList.add('dark-mode');
        else container.classList.remove('dark-mode');
    }

    function download(idx) {
        const svg = document.getElementById(`prev-${idx}`).querySelector('svg');
        const scale = document.getElementById(`scale-${idx}`).value;
        const canvas = document.getElementById('conversion-canvas');
        const ctx = canvas.getContext('2d');

        const svgData = new XMLSerializer().serializeToString(svg);
        const img = new Image();
        const svgBlob = new Blob([svgData], {type: 'image/svg+xml;charset=utf-8'});
        const url = URL.createObjectURL(svgBlob);

        img.onload = function() {
            canvas.width = 400 * scale;
            canvas.height = 400 * scale;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            
            const link = document.createElement('a');
            link.download = `Punto33_Logo_${idx+1}_${canvas.width}px.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
            URL.revokeObjectURL(url);
        };
        img.src = url;
    }
</script>

</body>
</html>
